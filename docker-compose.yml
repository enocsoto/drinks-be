# Levanta solo la base de datos MongoDB para desarrollo local.
# La aplicación NestJS se corre con: npm run dev
# Uso: docker compose up -d

services:
  db:
    image: mongo:7
    container_name: drinks_db
    restart: unless-stopped
    command: ["mongod", "--quiet", "--setParameter", "diagnosticDataCollectionEnabled=false"]
    ports:
      - '${DB_PORT:-27020}:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
    driver: local
